name: Keep-Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          URL: ${{ secrets.KEEP_ALIVE_URL || 'https://room-booking-pjo6.onrender.com/health/' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 60 --max-time 120 --retry 3 --retry-delay 5 --retry-connrefused --retry-all-errors "$URL" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (HTTP $STATUS)"
          else
            echo "Health check failed (HTTP $STATUS)"
            exit 1
          fi
